name: Build and Test

permissions:
  contents: read
  statuses: write

env:
  COVERAGE_MIN_PERCENT: "95.0"

on:
  push:
    branches-ignore:
      - main
      - develop
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      env:
        CI: true
      run: dotnet build --configuration Release --no-restore

    - name: Test
      run: dotnet test --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"

    - name: Enforce coverage threshold
      id: coverage_gate
      shell: bash
      run: |
        coverage_file="$(find . -type f -name 'coverage.cobertura.xml' -print -quit)"
        if [[ -z "$coverage_file" ]]; then
          echo "No coverage.cobertura.xml found."
          exit 1
        fi

        line_rate="$(awk '
          /line-rate="/ {
            match($0, /line-rate="[^"]+"/)
            value = substr($0, RSTART + 11, RLENGTH - 12)
            print value
            exit
          }
        ' "$coverage_file")"
        if [[ -z "$line_rate" ]]; then
          echo "Could not read line-rate from $coverage_file"
          exit 1
        fi

        coverage_percent="$(awk "BEGIN { printf \"%.2f\", $line_rate * 100 }")"
        echo "Line coverage: ${coverage_percent}% (required: >= ${COVERAGE_MIN_PERCENT}%)"
        echo "coverage_percent=${coverage_percent}" >> "$GITHUB_OUTPUT"

        awk "BEGIN { exit !($coverage_percent >= $COVERAGE_MIN_PERCENT) }" || {
          echo "Coverage gate failed."
          exit 1
        }

    - name: Upload coverage reports to Codecov
      if: always()
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: '**/coverage.cobertura.xml'
        override_pr: ${{ github.event.pull_request.number }}
        fail_ci_if_error: false

    - name: Post codecov/patch status
      if: always()
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        COMMIT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      run: |
        outcome="${{ steps.coverage_gate.outcome }}"
        if [[ "$outcome" == "success" ]]; then
          state="success"
          description="Coverage ${{ steps.coverage_gate.outputs.coverage_percent }}% >= ${COVERAGE_MIN_PERCENT}%"
        elif [[ "$outcome" == "failure" ]]; then
          state="failure"
          description="Coverage gate failed (< ${COVERAGE_MIN_PERCENT}%)"
        else
          echo "Coverage gate was skipped (build/test failed earlier); not posting status."
          exit 0
        fi

        gh api "repos/${{ github.repository }}/statuses/${COMMIT_SHA}" \
          --method POST \
          -f state="${state}" \
          -f context="codecov/patch" \
          -f description="${description}" \
          -f target_url="https://app.codecov.io/github/${{ github.repository }}"
